    SSOConfigRequest:
      type: object
      additionalProperties: false
      required: [type]
      description: >-
        OIDC or SAML configuration upsert. Secret material is referenced by
        ClientSecretRef or supplied as public IdP certificates; plaintext
        client secrets are not accepted.
      properties:
        api_version:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        type:
          type: string
          enum: [oidc, saml]
        oidc:
          type: object
          additionalProperties: true
          description: OIDC configuration; required when type=oidc. Must include a non-empty issuer.
        saml:
          type: object
          additionalProperties: true
          description: SAML configuration; required when type=saml. Must include an IdP signing certificate (PEM).
    SSOConfigResponse:
      type: object
      additionalProperties: false
      required: [api_version, tenant_id, oidc, saml, trace_id]
      properties:
        api_version:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        tenant_id:
          type: string
        oidc:
          type: array
          items:
            type: object
            additionalProperties: true
        saml:
          type: array
          items:
            type: object
            additionalProperties: true
        trace_id:
          type: string
          minLength: 1
    SSOCallbackRequest:
      type: object
      additionalProperties: false
      description: >-
        OIDC id_token or SAML assertion verification input. Exactly one of
        id_token (OIDC) or assertion (SAML) is supplied for the matching route.
      properties:
        api_version:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        id_token:
          type: string
          description: OIDC id_token to verify (for /v1/sso/oidc/callback).
        assertion:
          type: string
          description: SAML assertion XML to verify (for /v1/sso/saml/acs).
    SSOSession:
      type: object
      additionalProperties: false
      required: [api_version, tenant_id, app_id, role, subject, trace_id]
      properties:
        api_version:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        tenant_id:
          type: string
        app_id:
          type: string
        role:
          type: string
        subject:
          type: string
        email:
          type: string
        session_token:
          type: string
          description: Opaque server-side session token, present when session management is enabled.
        session_expires_at:
          type: string
          format: date-time
          description: Session expiry, present when session management is enabled.
        trace_id:
          type: string
          minLength: 1
    LogoutResult:
      type: object
      additionalProperties: false
      required: [api_version, revoked, trace_id]
      properties:
        api_version:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        revoked:
          type: boolean
          description: True when an active session was revoked; false when no matching session existed (idempotent).
        trace_id:
          type: string
          minLength: 1
    AuditExportRequest:
      type: object
      additionalProperties: false
      description: Optional filter for the audit export. An empty body exports the full tenant chain.
      properties:
        api_version:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        idempotency_key:
          type: string
          description: Accepted for parity with the idempotent-mutation convention. Audit export is a read; the key is ignored.
        since:
          type: string
          format: date-time
          description: Inclusive lower bound (RFC3339). Unparseable or empty means unbounded.
        until:
          type: string
          format: date-time
          description: Inclusive upper bound (RFC3339). Unparseable or empty means unbounded.
        limit:
          type: integer
          minimum: 0
          description: Maximum records to export. 0 means no limit.
        range:
          type: object
          additionalProperties: false
          description: Optional sequence window applied after the time-range query.
          properties:
            from_sequence:
              type: integer
              format: int64
              description: Inclusive lower bound on record sequence.
            to_sequence:
              type: integer
              format: int64
              description: Inclusive upper bound on record sequence.
    AuditRecord:
      type: object
      additionalProperties: false
      required: [id, seq, tenant_id, app_id, actor, action, resource, outcome, occurred_at, prev_hash, record_hash]
      properties:
        id:
          type: string
        seq:
          type: integer
          format: int64
        tenant_id:
          type: string
        app_id:
          type: string
        actor:
          type: string
        action:
          type: string
        resource:
          type: string
        outcome:
          type: string
        occurred_at:
          type: string
          format: date-time
        attributes:
          type: object
          additionalProperties: true
        prev_hash:
          type: string
        record_hash:
          type: string
    AuditExportResult:
      type: object
      additionalProperties: false
      required: [api_version, status, stats, chain_valid, head_hash, count, records, trace_id]
      properties:
        api_version:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        status:
          type: string
          enum: [accepted]
        stats:
          type: object
          additionalProperties: false
          required: [enqueued, exported, dropped, failed]
          properties:
            enqueued:
              type: integer
              minimum: 0
            exported:
              type: integer
              minimum: 0
            dropped:
              type: integer
              minimum: 0
            failed:
              type: integer
              minimum: 0
        chain_valid:
          type: boolean
          description: Whether the exported records form a verified tamper-evident hash chain.
        head_hash:
          type: string
          description: Current head record hash of the tenant audit chain.
        count:
          type: integer
          minimum: 0
        records:
          type: array
          items:
            $ref: "#/components/schemas/AuditRecord"
        trace_id:
          type: string
          minLength: 1
    CacheStatus:
      type: object
      additionalProperties: false
      required: [api_version, profile, enabled, entries, trace_id]
      properties:
        api_version:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        profile:
          type: string
          enum: [edge, small, standard, enterprise]
        enabled:
          type: boolean
        entries:
