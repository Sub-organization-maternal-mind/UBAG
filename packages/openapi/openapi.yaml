          minLength: 16
          maxLength: 128
          pattern: "^[A-Za-z0-9._:-]+$"
        job_id:
          type: string
          pattern: "^job_[A-Za-z0-9]+$"
          description: Optional body copy of the path job_id; when present it must match the route.
        reason:
