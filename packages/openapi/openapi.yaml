          minLength: 1
        content_type:
          type: string
        size_bytes:
          type: integer
          minimum: 0
        checksum:
          type: string
          description: Hex-encoded SHA-256 checksum when known.
        created_at:
          type: string
          format: date-time
    ArtifactListResponse:
      type: object
      additionalProperties: false
      required: [api_version, job_id, kind, data, trace_id]
