# UBAG — VPS self-host profile (185.252.233.186, shared box).
#
# This is a trimmed sibling of docker-compose.small.yml, not an override of it:
# same Dockerfiles/config templates (deploy/small/*, unmodified), but only the
# services this box needs. Excluded vs the small profile: Dragonfly (confirmed
# unused by any gateway code path), MinIO (localfs artifacts instead — this host
# has persistent disk, unlike Render's free tier), and NATS (file-spool executor
# mode needs no queue at single-instance scale; verified in
# apps/gateway/internal/serve/serve.go + executor/{filespool,workerconsumer}.go:
# UBAG_EXECUTOR_MODE=file builds a FileSpoolWorkerQueue that never touches NATS).
#
# Live-browser (added 2026-07-17, owner-approved lifting the earlier 1-core/2GB
# cap to ~2 cores/4GB): a headed Google Chrome runs on the VPS (deploy/vps/
# browser) so provider logins live on the server and jobs run 24/7 with the
# operator's laptop off. The operator signs in once via the dashboard's Browser
# Sessions widget (streamed by tools/live-browser/bridge.mjs over /live-ws); the
# gateway's live worker attaches to that same Chrome over CDP. Safe-mode intact:
# a human does the login, UBAG never types credentials or solves CAPTCHAs.
#
# Resource budget (cpus / mem_limit), under the ~2-core/4GB owner-approved cap on
# a box with 6 cores / 11GB (~7GB free):
#   gateway......... 0.60 cpu / 1300m  (Go binary + Python live worker + Playwright CDP client)
#   nginx-dashboard.. 0.15 cpu /   96m
#   browser......... 1.00 cpu / 1900m  (headed Chrome + Xvfb)
#   TOTAL........... 1.75 cpu / 3296m  (under ~2 cores / 4096m)
#
# Postgres comes from the shared platform stack at /opt/platform since
# 2026-07-17 (one instance for every project on the box — see
# /opt/platform/PLATFORM-RULES.md). The gateway joins the external `platform`
# docker network and reads UBAG_POSTGRES_DSN from deploy/vps/env.local
# (credentials from /opt/platform/projects/ubag.env).
#
# Ingress: this box already runs a shared Nginx Proxy Manager (NPM) container
# for ~15 other client sites, listening on host 80/81/443. Rather than publish
# another host port (this VPS has no active firewall — ufw is inactive — so
# any 0.0.0.0-bound port is directly internet-reachable, not just via
# Cloudflare/NPM), nginx-dashboard joins NPM's own docker network
# (nginx-proxy-manager_default, declared external below) so NPM reaches it by
# container name with zero additional host-port exposure. See deploy/vps/README.md
# for the NPM Proxy Host settings and the ubag.polytronx.com DNS/Cloudflare status.
#
# Deploy: from /opt/docker/ubag on the VPS,
#   docker compose -f docker-compose.vps.yml --env-file deploy/vps/env.local up -d --build

name: ubag-vps

services:
  # Applies migrations/postgres/0001-0010 itself via gateway-entrypoint.sh
  # (baked into the image), tolerating individual failures — 0008+ needs
  # pg_partman, not available on every managed Postgres and unused by the
  # mock/adapter-jobs scope this profile targets. No separate migrate step
  # needed.
  gateway:
    build:
      context: .
      dockerfile: deploy/small/gateway.Dockerfile
    image: ${UBAG_GATEWAY_IMAGE:-ubag/gateway:vps-local}
    cpus: "0.60"
    mem_limit: 1300m
    restart: unless-stopped
    environment:
      UBAG_GATEWAY_ADDR: ":8080"
      GOMAXPROCS: "1"
      GOMEMLIMIT: "950MiB"
      UBAG_APP_SECRET: ${UBAG_APP_SECRET:?Set UBAG_APP_SECRET in deploy/vps/env.local}
      UBAG_API_VERSION: ${UBAG_API_VERSION:-2026-05-22}
      UBAG_GATEWAY_VERSION: ${UBAG_GATEWAY_VERSION:-0.0.0-vps}
      UBAG_BUILD_COMMIT: ${UBAG_BUILD_COMMIT:-local}
      UBAG_ACTOR_ROLE: ${UBAG_ACTOR_ROLE:-}
      UBAG_GATEWAY_STORE: postgres
      # Full DSN lives in deploy/vps/env.local (platform credentials from
      # /opt/platform/projects/ubag.env on the VPS — never committed).
      UBAG_POSTGRES_DSN: ${UBAG_POSTGRES_DSN:?Set UBAG_POSTGRES_DSN in deploy/vps/env.local}
      UBAG_IDEMPOTENCY_TTL_HOURS: ${UBAG_IDEMPOTENCY_TTL_HOURS:-24}
      UBAG_DATABASE_MAX_OPEN_CONNS: ${UBAG_DATABASE_MAX_OPEN_CONNS:-5}
      UBAG_DATABASE_MAX_IDLE_CONNS: ${UBAG_DATABASE_MAX_IDLE_CONNS:-2}
      UBAG_DATABASE_CONN_MAX_LIFETIME_SECONDS: ${UBAG_DATABASE_CONN_MAX_LIFETIME_SECONDS:-300}
      # No queue — jobs spool to disk and are picked up in-process by the worker.
      UBAG_EXECUTOR_MODE: file
      UBAG_EXECUTOR_SPOOL_DIR: /var/lib/ubag/executor-spool
      UBAG_ARTIFACT_STORE: localfs
      UBAG_ARTIFACT_DIR: /var/lib/ubag/artifacts
      UBAG_WORKER_CONSUMER_ENABLED: "true"
      # python:3.12-slim (this image's runtime base) installs its interpreter
      # under /usr/local/bin, not /usr/bin.
      UBAG_WORKER_PYTHON: /usr/local/bin/python3
      # run_live_worker.py routes live provider targets (chatgpt_web, gemini_web,
      # deepseek_web, claude_web, ...) to the Playwright CDP-attach engine, and
      # target=mock still falls through to the registry mock adapter — so mock
      # jobs keep working unchanged (verified in run_live_worker.py routing).
      UBAG_WORKER_SCRIPT: /app/apps/worker/run_live_worker.py
      # Warm page reuse is opt-in. False preserves the per-job worker process;
      # when explicitly enabled, the daemon uses its bundled long-lived script.
      UBAG_WORKER_DAEMON: ${UBAG_WORKER_DAEMON:-false}
      UBAG_WORKER_DAEMON_SCRIPT: ${UBAG_WORKER_DAEMON_SCRIPT:-/app/apps/worker/run_worker_daemon.py}
      # Attach to the browser container's Chrome over CDP (via its socat proxy)
      # instead of launching a throwaway browser — live jobs reuse the operator's
      # manually-logged-in session. http(s):// endpoint => connect_over_cdp;
      # needs only the playwright pip package (already in the gateway image), no
      # browser download.
      # MUST be the browser's IP, not its service name: Chrome's DevTools HTTP
      # endpoint rejects any Host header that isn't localhost or an IP (a
      # hostname like "browser" gets HTTP 500), so this uses the static IP pinned
      # on ubag-private below. (The old production setup used an IP for the same
      # reason.)
      UBAG_REMOTE_BROWSER_ENDPOINT: ${UBAG_REMOTE_BROWSER_ENDPOINT:-http://172.28.0.10:9223}
      UBAG_WORKER_POLL_INTERVAL_MS: ${UBAG_WORKER_POLL_INTERVAL_MS:-500}
      # Live provider jobs (page loads, streamed responses) need more headroom
      # than mock jobs; matches the verified local live-runtime setting.
      UBAG_WORKER_MAX_RUNTIME_MS: ${UBAG_WORKER_MAX_RUNTIME_MS:-180000}
      UBAG_WEBHOOK_WORKER_ENABLED: "false"
      UBAG_WEBHOOK_SECRET: ${UBAG_WEBHOOK_SECRET:-}
      # Record every chat a live job creates, so the chat-reaper below can only
      # ever delete OUR chats and never the operator's own. The accounts are real
      # and their sidebars mix UBAG's job chats with the human's work; provider
      # deletion is permanent. Recording is the safety mechanism — without it the
      # reaper has no legitimate targets at all (which is the safe failure mode).
      UBAG_CHAT_LEDGER_ENABLED: ${UBAG_CHAT_LEDGER_ENABLED:-true}
      UBAG_CHAT_LEDGER_PATH: /var/lib/ubag/chat-ledger/ledger.jsonl
    volumes:
      - executor_spool:/var/lib/ubag/executor-spool
      - artifact_data:/var/lib/ubag/artifacts
      - chat_ledger:/var/lib/ubag/chat-ledger
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/v1/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ubag-private
      # Shared backing-services network (platform-postgres et al.) — created by
      # /opt/platform/bin/init-platform.sh.
      - platform

  nginx-dashboard:
    image: nginx:alpine
    container_name: ubag-nginx-dashboard
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
    cpus: "0.15"
    mem_limit: 96m
    environment:
      UBAG_GATEWAY_SECRET: ${UBAG_APP_SECRET:?Set UBAG_APP_SECRET in deploy/vps/env.local}
      NGINX_ENVSUBST_FILTER: "UBAG_"
    volumes:
      - "./deploy/small/nginx-dashboard/default.conf.template:/etc/nginx/templates/default.conf.template:ro"
      - "./deploy/vps/nginx-dashboard/.htpasswd:/etc/nginx/.htpasswd:ro"
      - "./apps/dashboard/dist:/srv/dashboard:ro"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - ubag-private
      # NPM's own network — lets the shared Nginx Proxy Manager container
      # reach this one by name (ubag-nginx-dashboard:80) without publishing
      # any host port. Must already exist (created by the nginx-proxy-manager
      # compose stack at /opt/docker/nginx-proxy-manager).
      - nginx-proxy-manager_default

  # Headed Google Chrome on Xvfb, streamed to the dashboard's Browser Sessions
  # widget by tools/live-browser/bridge.mjs (attach-only). The operator logs in
  # to providers here; the gateway's live worker attaches over CDP (socat proxy
  # on 9223). Profile persists on a named volume so logins survive restarts.
  # No host port published — nginx reaches the bridge (58090) over ubag-private,
  # and CDP (9223) never leaves the internal network.
  browser:
    build:
      context: .
      dockerfile: deploy/vps/browser/Dockerfile
    image: ${UBAG_BROWSER_IMAGE:-ubag/vps-browser:local}
    container_name: ubag-vps-browser
    restart: unless-stopped
    cpus: "1.0"
    mem_limit: 1900m
    environment:
      UBAG_BROWSER_GEOMETRY: ${UBAG_BROWSER_GEOMETRY:-1280x800x24}
      UBAG_BROWSER_START_URL: ${UBAG_BROWSER_START_URL:-https://chatgpt.com}
    volumes:
      - browser_profile:/profiles
    healthcheck:
      # Healthy only when BOTH the dashboard bridge (58090) and Chrome's CDP
      # (58091) answer — a wedged Chrome behind a live bridge still flips this.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:58090/health >/dev/null 2>&1 && wget -qO- http://127.0.0.1:58091/json/version >/dev/null 2>&1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 45s
    networks:
      ubag-private:
        # Static IP so the gateway's CDP endpoint (an IP, not a hostname — see
        # UBAG_REMOTE_BROWSER_ENDPOINT above) is stable across recreation.
        ipv4_address: 172.28.0.10

  # Deletes UBAG's own stale job chats so the operator's sidebar stays clean.
  # It reads ONLY the chat ledger (chats UBAG recorded itself as creating) — it
  # never scans the sidebar, matches titles, or reasons about age alone, so the
  # operator's own chats are unreachable from here by construction. Bound
  # conversations are skipped (deleting one breaks the next turn). Deletion is
  # PERMANENT on these providers, hence: dry-run unless explicitly enabled.
  chat-reaper:
    image: ${UBAG_GATEWAY_IMAGE:-ubag/gateway:vps-local}
    container_name: ubag-vps-chat-reaper
    restart: unless-stopped
    cpus: "0.10"
    mem_limit: 256m
    depends_on:
      browser:
        condition: service_healthy
    environment:
      # Inert by default (repo convention for risky runtime features): without
      # this the loop only reports what it WOULD delete.
      UBAG_CHAT_REAPER_ENABLED: ${UBAG_CHAT_REAPER_ENABLED:-false}
      UBAG_CHAT_TTL_SECONDS: ${UBAG_CHAT_TTL_SECONDS:-7200}
      UBAG_CHAT_LEDGER_PATH: /var/lib/ubag/chat-ledger/ledger.jsonl
      UBAG_REMOTE_BROWSER_ENDPOINT: ${UBAG_REMOTE_BROWSER_ENDPOINT:-http://172.28.0.10:9223}
      UBAG_CHAT_REAPER_INTERVAL_SECONDS: ${UBAG_CHAT_REAPER_INTERVAL_SECONDS:-900}
    volumes:
      - chat_ledger:/var/lib/ubag/chat-ledger
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'while true; do python3 /app/apps/worker/run_chat_reaper.py || echo "chat-reaper: cycle failed"; sleep "${UBAG_CHAT_REAPER_INTERVAL_SECONDS:-900}"; done'
    networks:
      - ubag-private

networks:
  ubag-private:
    # NOT internal: the browser container needs outbound internet to reach the
    # AI providers (chatgpt.com, gemini, etc.) — an internal network gave Chrome
    # ERR_NAME_NOT_RESOLVED. This carries only app-tier traffic (gateway ↔ browser
    # ↔ nginx); Postgres is on the external `platform` network, and none of these
    # containers publish a host port, so dropping `internal` grants egress only —
    # it adds no inbound exposure. The gateway also reaches egress via `platform`.
    # Pinned subnet so the browser container can hold a static IP (172.28.0.10)
    # for the gateway's CDP endpoint. 172.28.0.0/24 was free on this box at
    # setup (checked against every existing docker network subnet).
    ipam:
      config:
        - subnet: 172.28.0.0/24
  nginx-proxy-manager_default:
    external: true
  platform:
    external: true

volumes:
  executor_spool:
  artifact_data:
  browser_profile:
  # Shared gateway<->chat-reaper: the record of chats UBAG created. This IS the
  # reaper's allowlist — losing it means nothing gets reaped (safe), never that
  # something extra does.
  chat_ledger:
