# UBAG nginx-dashboard — ingress router replacing Caddy (blueprint §24.2 §29).
# Handles: API proxy → gateway, noVNC proxy → browser-viewer,
#           SvelteKit SPA + static assets → /srv/dashboard.
# NPM provides TLS termination; this container runs on HTTP/80 internally.

upstream ubag_gateway {
    server gateway:8080;
    keepalive 32;
}

upstream ubag_browser_viewer {
    server browser-viewer:6080;
    keepalive 8;
}

server {
    listen 80;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_types
        text/css
        text/plain
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        application/wasm;
    gzip_min_length 1024;

    # ── Healthcheck ───────────────────────────────────────────────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Blocked at edge (internal-only routes) ────────────────────────────────
    location ~ ^/v1/(metrics|ready)(/|$) {
        return 404;
    }

    # ── Gateway API (with SSE long-poll support) ──────────────────────────────
    location /v1/ {
        proxy_pass         http://ubag_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";  # keepalive upstream
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        add_header X-Content-Type-Options "nosniff"    always;
        add_header Referrer-Policy        "no-referrer" always;
        add_header X-Frame-Options        "DENY"        always;
    }

    # ── noVNC live-browser viewer (WebSocket + SAMEORIGIN embed) ─────────────
    location /novnc/ {
        rewrite            ^/novnc/(.*) /$1 break;
        proxy_pass         http://ubag_browser_viewer;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;

        add_header X-Content-Type-Options "nosniff"     always;
        add_header Referrer-Policy        "no-referrer"  always;
        add_header X-Frame-Options        "SAMEORIGIN"   always;
    }

    # ── SvelteKit content-hashed bundles (immutable, cache forever) ──────────
    location /_app/immutable/ {
        root /srv/dashboard;
        try_files $uri =404;

        # No 'always' — only set immutable cache on 200 responses, not on 4xx
        add_header Cache-Control          "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff";
        access_log off;
    }

    # ── Other SvelteKit build assets ─────────────────────────────────────────
    location /_app/ {
        root /srv/dashboard;
        try_files $uri =404;

        add_header Cache-Control          "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff"              always;
        access_log off;
    }

    # ── PWA: service worker (must be served from root scope, no-cache) ────────
    location = /sw.js {
        root /srv/dashboard;
        add_header Cache-Control      "no-cache"  always;
        add_header Service-Worker-Allowed "/" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── PWA: web app manifest ─────────────────────────────────────────────────
    location = /manifest.webmanifest {
        root /srv/dashboard;
        add_header Cache-Control          "no-cache" always;
        add_header X-Content-Type-Options "nosniff"  always;
    }

    # ── Favicon ───────────────────────────────────────────────────────────────
    location = /favicon.svg {
        root /srv/dashboard;
        add_header Cache-Control          "public, max-age=86400" always;
        add_header X-Content-Type-Options "nosniff"               always;
        access_log off;
    }

    # ── Dashboard SPA (try_files with SPA fallback) ───────────────────────────
    # root /srv means nginx resolves /dashboard/... → /srv/dashboard/...
    location /dashboard/ {
        root /srv;
        try_files $uri $uri/ /dashboard/index.html;

        add_header Cache-Control          "no-cache"  always;
        add_header X-Content-Type-Options "nosniff"   always;
        add_header Referrer-Policy        "no-referrer" always;
        add_header X-Frame-Options        "DENY"        always;
    }

    # ── Redirect root → dashboard ─────────────────────────────────────────────
    location = / {
        return 301 /dashboard/;
    }

    # ── Fallback ──────────────────────────────────────────────────────────────
    location / {
        return 200 "UBAG ingress — API: /v1/*  Dashboard: /dashboard/\n";
        add_header Content-Type text/plain;
    }
}
