apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: targets.ubag.dev
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: ubag.dev
  scope: Namespaced
  names:
    kind: Target
    plural: targets
    singular: target
    shortNames:
      - tgt
    listKind: TargetList
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - name
                - url
              properties:
                name:
                  type: string
                  description: Human-readable name of the target.
                url:
                  type: string
                  description: Endpoint URL of the backing LLM or service.
                tags:
                  type: array
                  description: Optional labels for routing or filtering.
                  items:
                    type: string
                model:
                  type: string
                  description: Model identifier (e.g. "gpt-4", "llama-3").
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                  description: The .metadata.generation the controller last reconciled.
                ready:
                  type: boolean
                  description: Whether the resource has been successfully synced to the gateway.
                lastSyncedHash:
                  type: string
                  description: Hash of the spec that was last successfully synced.
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: URL
          type: string
          jsonPath: .spec.url
        - name: Model
          type: string
          jsonPath: .spec.model
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
