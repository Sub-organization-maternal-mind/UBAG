apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: apps.ubag.dev
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: ubag.dev
  scope: Namespaced
  names:
    kind: App
    plural: apps
    singular: app
    shortNames:
      - ubagapp
    listKind: AppList
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Human-readable name of the application.
                description:
                  type: string
                  description: Free-text description of the application's purpose.
                targets:
                  type: array
                  description: List of Target resource names this app routes traffic to.
                  items:
                    type: string
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                  description: The .metadata.generation the controller last reconciled.
                ready:
                  type: boolean
                  description: Whether the resource has been successfully synced to the gateway.
                lastSyncedHash:
                  type: string
                  description: Hash of the spec that was last successfully synced.
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
