# Example NATS server config enabling TLS + mTLS for client and cluster routes.
# Mount the certs generated by deploy/mtls/gen-certs.sh (or a real PKI) into the
# NATS container and start with: nats-server -c /etc/nats/nats-mtls.conf
#
# For the supercluster/gateway variant used in multi-region, see
# deploy/multi-region for full gateway{} blocks; this file shows the TLS pieces.

port: 4222
monitor_port: 8222

jetstream {
  store_dir: "/data"
}

# Client connections must present a cert signed by the CA (verify=true).
tls {
  cert_file: "/etc/nats/certs/server.crt"
  key_file:  "/etc/nats/certs/server.key"
  ca_file:   "/etc/nats/certs/ca.crt"
  verify:    true
  timeout:   3
}

# Cluster (route) connections also use mTLS.
cluster {
  name: "ubag"
  port: 6222
  tls {
    cert_file: "/etc/nats/certs/server.crt"
    key_file:  "/etc/nats/certs/server.key"
    ca_file:   "/etc/nats/certs/ca.crt"
    verify:    true
  }
  routes: [
    # nats-route://nats-1:6222
    # nats-route://nats-2:6222
  ]
}
