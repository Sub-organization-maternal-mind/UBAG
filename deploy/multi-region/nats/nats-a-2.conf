# NATS region A node 2 (additional cluster member)
server_name: nats-a-2
port: 4242
monitor_port: 8242

jetstream {
  store_dir: "/data"
  domain: region-a
}

cluster {
  name: region-a
  port: 6242
  routes: [
    "nats://nats-a:6222"
    "nats://nats-a-1:6232"
  ]
}

gateway {
  name: region-a
  port: 7242
  tls {
    cert_file: "/etc/nats/certs/server.crt"
    key_file:  "/etc/nats/certs/server.key"
    ca_file:   "/etc/nats/certs/ca.crt"
    verify: true
  }
  gateways: [
    { name: region-a, url: "nats://nats-a:7222" }
    { name: region-b, url: "nats://nats-b:7222" }
  ]
}
