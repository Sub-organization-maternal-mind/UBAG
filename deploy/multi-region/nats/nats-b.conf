# NATS region B — JetStream + supercluster gateway to region A.
server_name: nats-b
port: 4222
monitor_port: 8222

jetstream {
  store_dir: "/data"
  domain: region-b
}

cluster {
  name: region-b
  port: 6222
}

gateway {
  name: region-b
  port: 7222
  gateways: [
    { name: region-a, url: "nats://nats-a:7222" }
    { name: region-b, url: "nats://nats-b:7222" }
  ]
}
