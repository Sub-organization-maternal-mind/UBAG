# NATS region B — JetStream + supercluster gateway to region A.
#
# Cluster now requires ≥3 nodes for quorum (nats-b, nats-b-1, nats-b-2).
# Gateway uses mTLS; leaf-node port 7422 is available for edge connections.

server_name: nats-b
port: 4222
monitor_port: 8222

jetstream {
  store_dir: "/data"
  domain: region-b
}

cluster {
  name: region-b
  port: 6222
  routes: [
    "nats://nats-b-1:6232"
    "nats://nats-b-2:6242"
  ]
}

gateway {
  name: region-b
  port: 7222
  tls {
    cert_file: "/etc/nats/certs/server.crt"
    key_file:  "/etc/nats/certs/server.key"
    ca_file:   "/etc/nats/certs/ca.crt"
    verify: true
  }
  gateways: [
    { name: region-a, url: "nats://nats-a:7222" }
    { name: region-b, url: "nats://nats-b:7222" }
  ]
}

leafnodes {
  port: 7422
  tls {
    cert_file: "/etc/nats/certs/server.crt"
    key_file:  "/etc/nats/certs/server.key"
    ca_file:   "/etc/nats/certs/ca.crt"
    verify: true
  }
}
