# NATS region A — JetStream + supercluster gateway to region B.
# Each region is its own NATS cluster; gateways connect the clusters into a
# supercluster so JetStream and subjects span regions. In this single-host demo
# region B is reachable via the shared docker network alias `nats-b`.
#
# Cluster now requires ≥3 nodes for quorum (nats-a, nats-a-1, nats-a-2).
# Gateway uses mTLS; leaf-node port 7422 is available for edge connections.

server_name: nats-a
port: 4222
monitor_port: 8222

jetstream {
  store_dir: "/data"
  domain: region-a
}

cluster {
  name: region-a
  port: 6222
  routes: [
    "nats://nats-a-1:6232"
    "nats://nats-a-2:6242"
  ]
}

gateway {
  name: region-a
  port: 7222
  tls {
    cert_file: "/etc/nats/certs/server.crt"
    key_file:  "/etc/nats/certs/server.key"
    ca_file:   "/etc/nats/certs/ca.crt"
    verify: true
  }
  gateways: [
    { name: region-a, url: "nats://nats-a:7222" }
    { name: region-b, url: "nats://nats-b:7222" }
  ]
}

leafnodes {
  port: 7422
  tls {
    cert_file: "/etc/nats/certs/server.crt"
    key_file:  "/etc/nats/certs/server.key"
    ca_file:   "/etc/nats/certs/ca.crt"
    verify: true
  }
}
