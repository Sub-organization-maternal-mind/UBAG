# NATS leaf node — connects to the regional hub cluster.
# Copy and customize for each leaf deployment.
#
# A leaf node bridges a local NATS cluster (e.g., an edge site) into the
# regional supercluster. Leaf-node connections use mTLS.

server_name: leaf-node-1
port: 4222

leafnodes {
  remotes: [
    {
      url: "tls://nats-a:7422"
      tls {
        cert_file: "/etc/nats/certs/leaf.crt"
        key_file:  "/etc/nats/certs/leaf.key"
        ca_file:   "/etc/nats/certs/ca.crt"
      }
    }
  ]
}
