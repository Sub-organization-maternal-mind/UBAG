# Helm values overlay for region B (enterprise multi-region).
#   helm upgrade --install ubag-b deploy/helm/ubag \
#     -f deploy/helm/ubag/values-production.yaml \
#     -f deploy/multi-region/helm-values/values-region-b.yaml \
#     --kube-context region-b --namespace ubag --create-namespace

podLabels:
  region: region-b

ingress:
  enabled: true
  hosts:
    - host: b.ubag.example.com
      paths:
        - path: /v1/
          pathType: Prefix
  tls:
    - secretName: ubag-tls-b
      hosts:
        - b.ubag.example.com

config:
  UBAG_REGION: "region-b"
  UBAG_NATS_URL: "nats://nats.region-b.svc.cluster.local:4222"
  UBAG_MINIO_ENDPOINT: "minio.region-b.svc.cluster.local:9000"

secrets:
  existingSecret: ubag-gateway-secrets-b
