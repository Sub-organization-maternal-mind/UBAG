# Vector log-shipping config (Task 2.7)
# Scrapes JSON logs from gateway stdout → Loki (when available).

sources:
  gateway_logs:
    type: docker_logs
    include_containers:
      - "ubag-gateway"

transforms:
  parse_json:
    type: remap
    inputs:
      - gateway_logs
    source: |
      # Parse the ubag JSON log record.
      . = parse_json!(string!(.message))

sinks:
  loki:
    type: loki
    inputs:
      - parse_json
    endpoint: "${LOKI_URL:-http://loki:3100}"
    encoding:
      codec: json
    labels:
      service: "{{ service }}"
      level: "{{ level }}"
      environment: "{{ environment }}"
