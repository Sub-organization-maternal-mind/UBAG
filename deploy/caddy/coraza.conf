# deploy/caddy/coraza.conf
#
# Coraza WAF — CRS configuration reference
# =========================================
# This file documents the OWASP Core Rule Set (CRS) directives used by the
# UBAG gateway.  The actual coraza_waf{} block lives in Caddyfile.standard;
# these comments serve as the authoritative reference for every knob.
#
# Required Caddy build flag:
#   --with github.com/corazawaf/coraza-caddy/v2
#
# CRS bundles shipped with the coraza-caddy module:
#   @coraza.conf-recommended   — Coraza engine defaults (recommended starting point)
#   @crs-setup.conf.example    — CRS tunables (paranoia level, anomaly thresholds…)
#   @owasp_crs/*.conf          — The actual CRS rule files (SQLi, XSS, RFI, …)
#
# ---------------------------------------------------------------------------
# DETECTION vs ENFORCEMENT
# ---------------------------------------------------------------------------
#
#   SecRuleEngine DetectionOnly   ← default; logs violations, never blocks
#   SecRuleEngine On              ← blocks requests that exceed the anomaly score
#   SecRuleEngine Off             ← disables Coraza entirely (not recommended)
#
# To switch to enforcement mode, change the coraza_waf{} block in
# Caddyfile.standard:
#
#   coraza_waf {
#     load_owasp_crs
#     directives `
#       SecRuleEngine On          # ← changed from DetectionOnly
#       SecRequestBodyAccess On
#       SecResponseBodyAccess Off
#       SecDebugLogLevel 1
#     `
#   }
#
# ---------------------------------------------------------------------------
# BODY INSPECTION
# ---------------------------------------------------------------------------
#
#   SecRequestBodyAccess On   — inspect POST / PUT bodies (required for SQLi/XSS
#                               in JSON / form payloads)
#   SecResponseBodyAccess Off — skip response body scanning (saves CPU; enable
#                               only if you need outbound data-loss prevention)
#
# ---------------------------------------------------------------------------
# RULE SIGNATURES COVERED BY CRS
# ---------------------------------------------------------------------------
#
# CRS 4.x provides signature coverage for:
#   • SQL Injection (SQLi)            — CRS rules 942xxx
#   • Cross-Site Scripting (XSS)      — CRS rules 941xxx
#   • Path Traversal / LFI / RFI      — CRS rules 930xxx, 931xxx, 932xxx
#   • Remote Code Execution (RCE)     — CRS rules 932xxx
#   • HTTP Protocol violations        — CRS rules 920xxx
#   • Scanning / probing tools        — CRS rules 913xxx
#
# ---------------------------------------------------------------------------
# PARANOIA LEVEL (tunable in @crs-setup.conf.example)
# ---------------------------------------------------------------------------
#
#   PL 1 (default) — lowest false-positive rate; covers the most common attacks
#   PL 2           — stricter; some additional false positives for unusual apps
#   PL 3           — very strict; suitable for high-security deployments
#   PL 4           — maximum detection; expect false positives requiring tuning
#
# To raise the paranoia level, add to the directives block:
#
#   SecAction \
#     "id:900000,\
#      phase:1,\
#      nolog,\
#      pass,\
#      t:none,\
#      setvar:tx.paranoia_level=2"
#
# ---------------------------------------------------------------------------
# ANOMALY SCORING THRESHOLDS
# ---------------------------------------------------------------------------
#
# CRS uses anomaly scoring rather than per-rule block decisions.
# Default thresholds (from @crs-setup.conf.example):
#
#   tx.inbound_anomaly_score_threshold  = 5  (block if ≥ 5; one Critical = 5)
#   tx.outbound_anomaly_score_threshold = 4
#
# These only take effect when SecRuleEngine is set to On.
#
# ---------------------------------------------------------------------------
# EXCLUSIONS / FALSE-POSITIVE TUNING
# ---------------------------------------------------------------------------
#
# To disable a specific rule (e.g. 942100 — SQL Injection via libinjection):
#
#   SecRuleRemoveById 942100
#
# To disable a rule for a specific URL:
#
#   SecRule REQUEST_URI "@beginsWith /v1/upload" \
#     "id:9001,phase:1,nolog,pass,ctl:ruleRemoveById=942100"
#
# Place exclusions after the Include @owasp_crs/*.conf line so they override
# the CRS defaults.
