# Flux HelmRelease deploying the UBAG chart from the Git source.
# Requires the GitRepository (gitrepository.yaml) and the Helm + Source
# controllers. Secrets are referenced via secrets.existingSecret, not managed
# here (use SOPS / sealed-secrets / external-secrets for the actual Secret).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ubag
  namespace: ubag
spec:
  interval: 5m
  releaseName: ubag
  targetNamespace: ubag
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: deploy/helm/ubag
      sourceRef:
        kind: GitRepository
        name: ubag
        namespace: flux-system
  # values-production.yaml is layered via valuesFrom is not possible for in-repo
  # files; inline the production-relevant overrides here instead.
  values:
    replicaCount: 3
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 20
    pdb:
      enabled: true
      minAvailable: 2
    serviceMonitor:
      enabled: true
    ingress:
      enabled: true
      className: nginx
      hosts:
        - host: ubag.example.com
          paths:
            - path: /v1/
              pathType: Prefix
    secrets:
      existingSecret: ubag-gateway-secrets
    config:
      UBAG_GATEWAY_STORE: "postgres"
      UBAG_ARTIFACT_STORE: "minio"
      UBAG_EXECUTOR_MODE: "nats"
      UBAG_WEBHOOK_OUTBOX: "postgres"
      UBAG_WEBHOOK_WORKER_ENABLED: "true"
      UBAG_MINIO_USE_SSL: "true"
      UBAG_WEBHOOK_ALLOWED_HOSTS: "hooks.example.com"
