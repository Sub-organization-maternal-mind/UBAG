name: Gateway Image

# Builds the small-profile gateway image on GitHub Actions and publishes it to
# GHCR so the VPS only ever pulls. Building on the box itself competed with ~15
# co-tenant stacks (a Go change cost ~25-30 min there); a clean runner plus a
# warm layer cache does the same work in a few minutes and leaves prod's CPU to
# serve traffic.
on:
  workflow_dispatch:
  push:
    branches:
      - perf/latency-az
    paths:
      - 'apps/gateway/**'
      - 'apps/worker/**'
      - 'adapters/**'
      - 'packages/proto/gen/go/**'
      - 'deploy/small/gateway.Dockerfile'
      - '.github/workflows/gateway-image.yml'

concurrency:
  group: gateway-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The gateway image bundles the Python worker that drives the browser, so this
  # gates the deploy on the worker suite. It runs in parallel with the build and
  # takes seconds; the build is the long pole, so this costs no wall-clock.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install worker
        working-directory: apps/worker
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]" || python -m pip install -e .
      - name: pytest
        working-directory: apps/worker
        env:
          UBAG_ADAPTER_OFFLINE: '1'
        run: python -m pytest tests/ -q

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/small/gateway.Dockerfile
          platforms: linux/amd64
          push: true
          # The immutable :sha-<commit> tag is what prod pins to, so a deploy
          # names an exact build instead of racing a moving branch tag.
          tags: |
            ghcr.io/sub-organization-maternal-mind/ubag-gateway:sha-${{ github.sha }}
            ghcr.io/sub-organization-maternal-mind/ubag-gateway:perf-latency-az
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize
        run: |
          echo "### Gateway image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "ghcr.io/sub-organization-maternal-mind/ubag-gateway:sha-${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # Pull-based deploy: the VPS never builds and never stores a registry
  # credential. This job authenticates with the run's own GITHUB_TOKEN, which
  # expires with the job, and hands it to the box over stdin for a single pull.
  # The deploy key is pinned by command= to deploy/small/ci-deploy.sh, so it
  # cannot open a shell or deploy anything but a validated sha-<commit> tag.
  deploy:
    # Both, deliberately: a green build only proves it compiles. This branch
    # deploys straight to prod, which drives live radiology reporting.
    needs: [build, test]
    if: github.ref == 'refs/heads/perf/latency-az'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    # Serialize deploys: two concurrent recreates of the same gateway would race.
    concurrency:
      group: gateway-deploy
      cancel-in-progress: false
    steps:
      - name: Add deploy key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.UBAG_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.UBAG_DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy gateway
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.GITHUB_TOKEN }}" | ssh \
            -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o BatchMode=yes \
            "root@${{ secrets.UBAG_DEPLOY_HOST }}" \
            "deploy-gateway sha-${{ github.sha }}"

      - name: Revoke local key material
        if: always()
        run: rm -f ~/.ssh/id_ed25519
