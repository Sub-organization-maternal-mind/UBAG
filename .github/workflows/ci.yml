# UBAG continuous integration (blueprint §0 Phase 0, §32 testing strategy).
# Lints, tests, scans, and builds every push and pull request. The jobs mirror
# the canonical local validation commands in package.json so "green in CI"
# matches "green on a contributor's machine".
name: ci

on:
  push:
    branches: [master, "feat/**", "release/**"]
  pull_request:
    branches: [master]

# One in-flight run per ref; new pushes cancel stale runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PNPM_VERSION: "10.33.2"
  GO_VERSION: "1.26.x"
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint & contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: pnpm }
      - uses: actions/setup-go@v5
        with: { go-version-file: apps/gateway/go.mod, cache-dependency-path: apps/gateway/go.sum }
      - run: pnpm install --frozen-lockfile
      - name: OpenAPI / JSON-Schema / proto contracts
        run: pnpm test:schema
      - name: Blueprint coverage & REST contracts
        run: pnpm check:blueprint && pnpm check:contracts
      - name: SDK freshness (generated contracts in sync)
        run: pnpm check:sdk-freshness
      - name: gofmt
        working-directory: apps/gateway
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then echo "gofmt needs to be run on:"; echo "$fmt_out"; exit 1; fi
      - name: go vet
        working-directory: apps/gateway
        env: { GOTOOLCHAIN: local }
        run: go vet ./...
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - name: Chaos experiment schema validation
        run: |
          pip install pytest
          python -m pytest tests/chaos/tests/test_schema.py -v
      # Phase 8: deployment infrastructure validation
      - name: Validate nginx-dashboard config
        run: node tools/check-nginx-dashboard.mjs
      - name: Lint Helm chart
        run: |
          helm lint deploy/helm/ubag || echo "helm not installed, skipping"
      - name: Validate Terraform modules
        run: node tools/check-enterprise-deploy.mjs
      - name: Check goreleaser config
        run: goreleaser check || echo "goreleaser not installed, skipping"
      - name: Validate GitOps manifests
        run: node tools/check-gitops.mjs
      - name: Validate installers
        run: node tools/check-installers.mjs
      - name: Multi-region validator
        run: node tools/check-multiregion.mjs

  operator:
    name: Operator (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: deploy/operator/go.mod
      - name: Build operator
        run: cd deploy/operator && go build ./...
      - name: Test operator
        run: cd deploy/operator && go test ./...

  gateway:
    name: Gateway (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: apps/gateway/go.mod, cache-dependency-path: apps/gateway/go.sum }
      - name: go test ./...
        working-directory: apps/gateway
        env: { GOTOOLCHAIN: local }
        run: go test -race -coverprofile=coverage.out ./...
      - name: Coverage summary + gate
        working-directory: apps/gateway
        run: |
          go tool cover -func=coverage.out | tee /tmp/coverage-summary.txt | tail -1
          TOTAL=$(grep '^total:' /tmp/coverage-summary.txt | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          # Current gate: 50% (baseline). Long-term target: 80% — see ADR-0014.
          awk -v cov="$TOTAL" 'BEGIN { if (cov+0 < 50) { print "Coverage " cov "% is below 50% gate"; exit 1 } }'
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: gateway-coverage
          path: apps/gateway/coverage.out
      - name: Phase 9 packages (region, mfa, jitadmin, audit, siem)
        working-directory: apps/gateway
        run: go test -race ./internal/region/... ./internal/mfa/... ./internal/jitadmin/... ./internal/audit/... ./internal/siem/...

  worker:
    name: Worker (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - name: Install worker (offline/mock test mode)
        run: python -m pip install --upgrade pip && python -m pip install -e "apps/worker[dev]" || python -m pip install -e apps/worker
      - name: ruff
        run: python -m pip install ruff && ruff check apps/worker adapters
      - name: pytest (UBAG_ADAPTER_OFFLINE=1)
        env: { UBAG_ADAPTER_OFFLINE: "1" }
        run: node tools/run-python-worker-tests.mjs
      - name: Worker region pinning tests
        env: { UBAG_ADAPTER_OFFLINE: "1" }
        run: python -m pytest apps/worker/tests/test_region.py -v

  node-suite:
    name: Node packages, SDKs, dashboard, docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: pnpm }
      - uses: actions/setup-go@v5
        with: { go-version-file: apps/gateway/go.mod, cache-dependency-path: apps/gateway/go.sum }
      - run: pnpm install --frozen-lockfile
      - name: Edge store, plugins, adapter-registry, security, sidecar
        run: pnpm test:edge-store && pnpm test:plugins && pnpm test:adapter-registry && pnpm test:security && pnpm test:sidecar
      - name: SDK suite (TypeScript + Go)
        run: pnpm test:sdk
      - name: Conformance + observability
        run: pnpm test:conformance && pnpm test:observability
      - name: Install Playwright browsers
        working-directory: apps/dashboard
        run: npx playwright install chromium --with-deps || npx playwright install chromium
      - name: CLI, dashboard, docs
        run: pnpm test:cli && pnpm test:dashboard && pnpm test:docs
      - name: Cookbook recipe count check
        run: node tools/check-cookbook.mjs
      - name: License posture check
        run: node tools/check-licenses.mjs
      - name: API reference freshness check
        run: node tools/check-api-reference.mjs
      # Phase 6: metrics cardinality + Grafana dashboard validation
      - name: Check Grafana dashboards (Task 2.5)
        run: node tools/check-grafana-dashboards.mjs deploy/grafana/dashboards/
      - name: Verify committed .wasm fixtures present (Task 1.7)
        run: |
          test -f apps/gateway/internal/plugins/testdata/echo_transform.wasm || (echo "echo_transform.wasm missing" && exit 1)
          test -f apps/gateway/internal/plugins/testdata/infinite_loop.wasm || (echo "infinite_loop.wasm missing" && exit 1)
          echo "WASM fixtures: OK"

  security-scan:
    name: Supply-chain & vuln scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: apps/gateway/go.mod, cache-dependency-path: apps/gateway/go.sum }
      - name: govulncheck
        working-directory: apps/gateway
        env: { GOTOOLCHAIN: local }
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./... || true
      - name: pip-audit
        run: pipx run pip-audit -r apps/worker/requirements.txt || true
      - name: Generate SBOM (syft)
        uses: anchore/sbom-action@v0
        with: { format: spdx-json, output-file: ubag.sbom.spdx.json }
      - uses: actions/upload-artifact@v4
        with: { name: sbom, path: ubag.sbom.spdx.json }

  sidecar-rust:
    name: Sidecar (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build and test Rust sidecar
        working-directory: packages/sidecar-rust
        run: cargo test --all-features

  sso-integration:
    name: SSO integration (Keycloak)
    runs-on: ubuntu-latest
    if: ${{ vars.UBAG_TEST_SSO == '1' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: apps/gateway/go.mod, cache-dependency-path: apps/gateway/go.sum }
      - name: Start Keycloak
        run: docker compose -f apps/gateway/tests/sso/docker-compose.yml up -d keycloak
      - name: Wait for Keycloak
        run: |
          until curl -sf http://localhost:8180/health/ready; do sleep 2; done
      - name: SSO integration tests
        working-directory: apps/gateway
        env: { UBAG_TEST_SSO: "1" }
        run: go test -tags integration ./tests/sso/... -v -timeout 120s

  itest:
    name: Integration tests (gateway + worker + DB)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }
      - name: Build gateway image
        run: docker build -t ubag/gateway:small-local -f deploy/small/gateway.Dockerfile .
      - name: Run integration tests
        run: node tools/run-integration-tests.mjs
        env:
          UBAG_ITEST_TIMEOUT: "30000"
