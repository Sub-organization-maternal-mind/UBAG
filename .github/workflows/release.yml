name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    paths:
      - '.goreleaser.yaml'
      - 'apps/gateway/**'
      - 'deploy/installers/**'

jobs:
  # Snapshot dry-run on PRs
  snapshot:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
      - name: Run goreleaser snapshot
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: build --snapshot --clean --id ubag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Full release on tag push
  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write  # for cosign OIDC signing
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COSIGN_EXPERIMENTAL: 1  # enables keyless signing

      - name: Update Homebrew tap
        if: "!contains(github.ref, 'pre') && !contains(github.ref, 'rc') && !contains(github.ref, 'beta')"
        uses: mislav/bump-homebrew-formula-action@v4
        with:
          formula-name: ubag
          homebrew-tap: ubag/homebrew-tap
          base-branch: main
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
