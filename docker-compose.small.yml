name: ubag-small

services:
  gateway:
    build:
      context: .
      dockerfile: deploy/small/gateway.Dockerfile
    image: ${UBAG_GATEWAY_IMAGE:-ubag/gateway:small-local}
    cpus: "1.0"
    mem_limit: 1g
    restart: unless-stopped
    environment:
      UBAG_GATEWAY_ADDR: ":8080"
      UBAG_APP_SECRET: ${UBAG_APP_SECRET:?Set UBAG_APP_SECRET in deploy/small/env.local}
      UBAG_API_VERSION: ${UBAG_API_VERSION:-2026-05-22}
      UBAG_GATEWAY_VERSION: ${UBAG_GATEWAY_VERSION:-0.0.0-small}
      UBAG_BUILD_COMMIT: ${UBAG_BUILD_COMMIT:-local}
      UBAG_ACTOR_ROLE: ${UBAG_ACTOR_ROLE:-}
      UBAG_GATEWAY_STORE: ${UBAG_GATEWAY_STORE:-memory}
      UBAG_POSTGRES_DSN: ${UBAG_POSTGRES_DSN:-}
      UBAG_IDEMPOTENCY_TTL_HOURS: ${UBAG_IDEMPOTENCY_TTL_HOURS:-24}
      UBAG_DATABASE_MAX_OPEN_CONNS: ${UBAG_DATABASE_MAX_OPEN_CONNS:-10}
      UBAG_DATABASE_MAX_IDLE_CONNS: ${UBAG_DATABASE_MAX_IDLE_CONNS:-5}
      UBAG_DATABASE_CONN_MAX_LIFETIME_SECONDS: ${UBAG_DATABASE_CONN_MAX_LIFETIME_SECONDS:-300}
      UBAG_EXECUTOR_MODE: ${UBAG_EXECUTOR_MODE:-noop}
      UBAG_EXECUTOR_SPOOL_DIR: ${UBAG_EXECUTOR_SPOOL_DIR:-/var/lib/ubag/executor-spool}
      UBAG_NATS_URL: ${UBAG_NATS_URL:-nats://nats:4222}
      UBAG_NATS_STREAM: ${UBAG_NATS_STREAM:-UBAG_JOBS}
      UBAG_NATS_SUBJECT: ${UBAG_NATS_SUBJECT:-ubag.jobs}
      UBAG_NATS_WORKER_DURABLE: ${UBAG_NATS_WORKER_DURABLE:-ubag-worker}
      UBAG_NATS_WORKER_ACK_WAIT_MS: ${UBAG_NATS_WORKER_ACK_WAIT_MS:-35000}
      UBAG_NATS_WORKER_NAK_DELAY_MS: ${UBAG_NATS_WORKER_NAK_DELAY_MS:-1000}
      UBAG_NATS_WORKER_FETCH_WAIT_MS: ${UBAG_NATS_WORKER_FETCH_WAIT_MS:-500}
      UBAG_NATS_WORKER_MAX_DELIVER: ${UBAG_NATS_WORKER_MAX_DELIVER:-5}
      UBAG_ARTIFACT_STORE: ${UBAG_ARTIFACT_STORE:-memory}
      UBAG_MINIO_ENDPOINT: ${UBAG_MINIO_ENDPOINT:-minio:9000}
      UBAG_MINIO_ACCESS_KEY: ${UBAG_MINIO_ACCESS_KEY:-}
      UBAG_MINIO_SECRET_KEY: ${UBAG_MINIO_SECRET_KEY:-}
      UBAG_MINIO_BUCKET: ${UBAG_MINIO_BUCKET:-ubag-artifacts}
      UBAG_MINIO_USE_SSL: ${UBAG_MINIO_USE_SSL:-false}
      UBAG_WORKER_CONSUMER_ENABLED: ${UBAG_WORKER_CONSUMER_ENABLED:-false}
      UBAG_WORKER_PYTHON: ${UBAG_WORKER_PYTHON:-/usr/bin/python3}
      UBAG_WORKER_SCRIPT: ${UBAG_WORKER_SCRIPT:-/app/apps/worker/run_mock_worker.py}
      UBAG_WORKER_POLL_INTERVAL_MS: ${UBAG_WORKER_POLL_INTERVAL_MS:-500}
      UBAG_WORKER_MAX_RUNTIME_MS: ${UBAG_WORKER_MAX_RUNTIME_MS:-120000}
      # Live-browser bridge: when the "live-browser" profile is up, point the
      # worker at the shared Chromium (CDP) so live jobs reuse the user-owned,
      # manually-logged-in profile instead of launching a throwaway browser.
      UBAG_REMOTE_BROWSER_ENDPOINT: ${UBAG_REMOTE_BROWSER_ENDPOINT:-}
      UBAG_BROWSER_HEADED: ${UBAG_BROWSER_HEADED:-false}
      UBAG_BROWSER_ENGINE: ${UBAG_BROWSER_ENGINE:-}
      UBAG_BROWSER_PROTOCOL: ${UBAG_BROWSER_PROTOCOL:-}
      # Loopback noVNC base advertised in session.manual_action_required events.
      # Must stay loopback (gateway redaction only forwards loopback noVNC URLs).
      UBAG_NOVNC_BASE_URL: ${UBAG_NOVNC_BASE_URL:-http://127.0.0.1:7900}
      UBAG_WEBHOOK_OUTBOX: ${UBAG_WEBHOOK_OUTBOX:-}
      UBAG_WEBHOOK_WORKER_ENABLED: ${UBAG_WEBHOOK_WORKER_ENABLED:-false}
      UBAG_WEBHOOK_SECRET: ${UBAG_WEBHOOK_SECRET:-}
      UBAG_WEBHOOK_SECRET_ENV_PREFIX: ${UBAG_WEBHOOK_SECRET_ENV_PREFIX:-UBAG_WEBHOOK_SECRET_}
      UBAG_WEBHOOK_MAX_ATTEMPTS: ${UBAG_WEBHOOK_MAX_ATTEMPTS:-8}
      UBAG_WEBHOOK_POLL_INTERVAL_MS: ${UBAG_WEBHOOK_POLL_INTERVAL_MS:-1000}
      UBAG_WEBHOOK_BATCH_SIZE: ${UBAG_WEBHOOK_BATCH_SIZE:-10}
      UBAG_WEBHOOK_LEASE_MS: ${UBAG_WEBHOOK_LEASE_MS:-30000}
      UBAG_WEBHOOK_REQUEST_TIMEOUT_MS: ${UBAG_WEBHOOK_REQUEST_TIMEOUT_MS:-10000}
      UBAG_WEBHOOK_RETRY_BASE_MS: ${UBAG_WEBHOOK_RETRY_BASE_MS:-1000}
      UBAG_WEBHOOK_RETRY_MAX_MS: ${UBAG_WEBHOOK_RETRY_MAX_MS:-300000}
      UBAG_WEBHOOK_MAX_RESPONSE_BYTES: ${UBAG_WEBHOOK_MAX_RESPONSE_BYTES:-8192}
      UBAG_WEBHOOK_WORKER_ID: ${UBAG_WEBHOOK_WORKER_ID:-gateway-webhook-worker}
      UBAG_WEBHOOK_ALLOW_INSECURE_HTTP: ${UBAG_WEBHOOK_ALLOW_INSECURE_HTTP:-false}
      UBAG_WEBHOOK_ALLOW_PRIVATE_HOSTS: ${UBAG_WEBHOOK_ALLOW_PRIVATE_HOSTS:-false}
      UBAG_WEBHOOK_ALLOWED_HOSTS: ${UBAG_WEBHOOK_ALLOWED_HOSTS:-}
      UBAG_WEBHOOK_ALLOW_ANY_PUBLIC_HOST: ${UBAG_WEBHOOK_ALLOW_ANY_PUBLIC_HOST:-false}
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${UBAG_BACKING_BIND_HOST:-127.0.0.1}:${UBAG_GATEWAY_PORT:-8080}:8080"
    volumes:
      - executor_spool:/var/lib/ubag/executor-spool
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/v1/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ubag-private

  nginx-dashboard:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
    environment:
      # Gateway secret injected server-side into /v1/* Authorization headers.
      # Never sent to the browser. Sourced from UBAG_APP_SECRET.
      UBAG_GATEWAY_SECRET: ${UBAG_APP_SECRET:?Set UBAG_APP_SECRET in deploy/small/env.local}
      # Restrict envsubst to UBAG_ vars so nginx $host/$uri/etc. are left intact.
      NGINX_ENVSUBST_FILTER: "UBAG_"
    ports:
      - "${UBAG_EDGE_BIND_HOST:-127.0.0.1}:${UBAG_NGINX_HTTP_PORT:-8083}:80"
    volumes:
      - "./deploy/small/nginx-dashboard/default.conf.template:/etc/nginx/templates/default.conf.template:ro"
      - "./deploy/small/nginx-dashboard/.htpasswd:/etc/nginx/.htpasswd:ro"
      - "./apps/dashboard/dist:/srv/dashboard:ro"
    networks:
      - ubag-public
      - ubag-private
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Live-browser viewer: real persistent Chromium on a virtual display, streamed
  # to the operator over noVNC for ToS-safe MANUAL login (no credential capture,
  # no CAPTCHA bypass). The worker attaches to this Chromium over CDP so live
  # jobs reuse the user-owned, already-logged-in profile. Opt-in via the
  # "live-browser" profile; noVNC is published to loopback and password-gated.
  browser-viewer:
    build:
      context: .
      dockerfile: deploy/small/browser-viewer/Dockerfile
    image: ${UBAG_BROWSER_VIEWER_IMAGE:-ubag/browser-viewer:small-local}
    cpus: "1.5"
    mem_limit: 3g
    restart: unless-stopped
    profiles: ["live-browser"]
    environment:
      UBAG_BROWSER_DISPLAY: ${UBAG_BROWSER_DISPLAY:-:99}
      UBAG_BROWSER_GEOMETRY: ${UBAG_BROWSER_GEOMETRY:-1280x800x24}
      UBAG_BROWSER_PROFILE_DIR: ${UBAG_BROWSER_PROFILE_DIR:-/profiles/default}
      UBAG_BROWSER_CDP_PORT: ${UBAG_BROWSER_CDP_PORT:-9222}
      UBAG_BROWSER_CDP_PROXY_PORT: ${UBAG_BROWSER_CDP_PROXY_PORT:-9223}
      UBAG_BROWSER_VNC_PORT: ${UBAG_BROWSER_VNC_PORT:-5900}
      UBAG_BROWSER_NOVNC_PORT: ${UBAG_BROWSER_NOVNC_PORT:-6080}
      UBAG_BROWSER_START_URL: ${UBAG_BROWSER_START_URL:-about:blank}
      UBAG_BROWSER_VNC_PASSWORD: ${UBAG_BROWSER_VNC_PASSWORD:?Set UBAG_BROWSER_VNC_PASSWORD in deploy/small/env.local}
    ports:
      # noVNC published to loopback only (matches the worker's loopback noVNC URL
      # at http://127.0.0.1:7900/session/...). CDP stays internal — never bound.
      - "${UBAG_BACKING_BIND_HOST:-127.0.0.1}:${UBAG_NOVNC_PORT:-7900}:6080"
    volumes:
      - browser_profiles:/profiles
    networks:
      - ubag-public
      - ubag-private
    # Health now reflects BOTH surfaces: the noVNC operator UI AND Chromium's CDP
    # endpoint (the proxy the worker attaches through). The old check probed only
    # noVNC, so a crashed/wedged Chromium stayed "healthy" and was never noticed.
    # The in-container watchdog auto-restarts Chromium; this check surfaces the
    # rare case where the browser is down to Docker/operators as well.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6080/ >/dev/null 2>&1 && wget -qO- http://127.0.0.1:9223/json/version >/dev/null 2>&1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 45s

  browser-topology-register:
    image: postgres:16-alpine
    restart: "no"
    profiles: ["live-browser"]
    depends_on:
      postgres:
        condition: service_healthy
      browser-viewer:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-ubag}
      POSTGRES_USER: ${POSTGRES_USER:-ubag}
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/small/env.local}
      UBAG_TOPOLOGY_TENANT_ID: ${UBAG_TOPOLOGY_TENANT_ID:-tenant_edge}
      UBAG_TOPOLOGY_INSTANCE_ID: ${UBAG_TOPOLOGY_INSTANCE_ID:-br_prod_browser_viewer}
      UBAG_TOPOLOGY_WORKER_ID: ${UBAG_TOPOLOGY_WORKER_ID:-browser-viewer}
      UBAG_BROWSER_PRIVATE_IP: ${UBAG_BROWSER_PRIVATE_IP:-172.31.0.5}
      UBAG_REMOTE_BROWSER_ENDPOINT: ${UBAG_REMOTE_BROWSER_ENDPOINT:-http://172.31.0.5:9223}
    volumes:
      - ./deploy/small/register-browser-topology.sh:/scripts/register-browser-topology.sh:ro
    entrypoint: ["/bin/sh", "/scripts/register-browser-topology.sh"]
    networks:
      - ubag-private

  browser-topology-sync:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ["live-browser"]
    depends_on:
      postgres:
        condition: service_healthy
      browser-viewer:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-ubag}
      POSTGRES_USER: ${POSTGRES_USER:-ubag}
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/small/env.local}
      UBAG_TOPOLOGY_TENANT_ID: ${UBAG_TOPOLOGY_TENANT_ID:-tenant_edge}
      UBAG_TOPOLOGY_INSTANCE_ID: ${UBAG_TOPOLOGY_INSTANCE_ID:-br_prod_browser_viewer}
      UBAG_TOPOLOGY_WORKER_ID: ${UBAG_TOPOLOGY_WORKER_ID:-browser-viewer}
      UBAG_BROWSER_PRIVATE_IP: ${UBAG_BROWSER_PRIVATE_IP:-172.31.0.5}
      UBAG_REMOTE_BROWSER_ENDPOINT: ${UBAG_REMOTE_BROWSER_ENDPOINT:-http://172.31.0.5:9223}
      UBAG_TOPOLOGY_SYNC_INTERVAL_SECONDS: ${UBAG_TOPOLOGY_SYNC_INTERVAL_SECONDS:-60}
    volumes:
      - ./deploy/small/register-browser-topology.sh:/scripts/register-browser-topology.sh:ro
      - ./deploy/small/sync-browser-topology.sh:/scripts/sync-browser-topology.sh:ro
    entrypoint: ["/bin/sh", "/scripts/sync-browser-topology.sh"]
    networks:
      - ubag-private

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ubag}
      POSTGRES_USER: ${POSTGRES_USER:-ubag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/small/env.local}
    ports:
      - "${UBAG_BACKING_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/postgres/0001_gateway_stores.sql:/docker-entrypoint-initdb.d/0001_gateway_stores.sql:ro
      - ./migrations/postgres/0002_artifact_metadata.sql:/docker-entrypoint-initdb.d/0002_artifact_metadata.sql:ro
      - ./migrations/postgres/0003_webhook_outbox.sql:/docker-entrypoint-initdb.d/0003_webhook_outbox.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ubag-private

  postgres-migrate:
    image: postgres:16-alpine
    restart: "no"
    profiles: ["migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ubag}
      POSTGRES_USER: ${POSTGRES_USER:-ubag}
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/small/env.local}
    command:
      - sh
      - -ec
      - |
        for migration in /migrations/*.sql; do
          echo "Applying $${migration}"
          psql -v ON_ERROR_STOP=1 -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -f "$${migration}"
        done
    volumes:
      - ./migrations/postgres:/migrations:ro
    networks:
      - ubag-private

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.30.3
    restart: unless-stopped
    command: ["--logtostderr"]
    ports:
      - "${UBAG_BACKING_BIND_HOST:-127.0.0.1}:${DRAGONFLY_PORT:-6379}:6379"
    volumes:
      - dragonfly_data:/data
    networks:
      - ubag-private
    healthcheck:
      test: ["CMD-SHELL", "printf 'PING\\r\\n' | nc 127.0.0.1 6379 | grep -q PONG"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ubag-root}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in deploy/small/env.local}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-http://127.0.0.1:9001}
    ports:
      - "${UBAG_BACKING_BIND_HOST:-127.0.0.1}:${MINIO_API_PORT:-9000}:9000"
      - "${UBAG_BACKING_BIND_HOST:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - ubag-private
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ubag-root}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in deploy/small/env.local}
      UBAG_MINIO_ACCESS_KEY: ${UBAG_MINIO_ACCESS_KEY:?Set UBAG_MINIO_ACCESS_KEY in deploy/small/env.local}
      UBAG_MINIO_SECRET_KEY: ${UBAG_MINIO_SECRET_KEY:?Set UBAG_MINIO_SECRET_KEY in deploy/small/env.local}
      UBAG_MINIO_BUCKET: ${UBAG_MINIO_BUCKET:-ubag-artifacts}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${UBAG_MINIO_BUCKET}"
        cat >/tmp/ubag-artifacts-rw.json <<EOF
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Action": ["s3:GetObject", "s3:PutObject", "s3:DeleteObject", "s3:ListBucket"],
              "Resource": ["arn:aws:s3:::$${UBAG_MINIO_BUCKET}", "arn:aws:s3:::$${UBAG_MINIO_BUCKET}/*"]
            }
          ]
        }
        EOF
        if ! mc admin user info local "$${UBAG_MINIO_ACCESS_KEY}" >/dev/null 2>&1; then
          mc admin user add local "$${UBAG_MINIO_ACCESS_KEY}" "$${UBAG_MINIO_SECRET_KEY}"
        fi
        if ! mc admin policy info local ubag-artifacts-rw >/dev/null 2>&1; then
          mc admin policy create local ubag-artifacts-rw /tmp/ubag-artifacts-rw.json
        fi
        mc admin policy attach local ubag-artifacts-rw --user "$${UBAG_MINIO_ACCESS_KEY}"
    networks:
      - ubag-private

  prometheus:
    image: prom/prometheus:v3.4.2
    restart: unless-stopped
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "${UBAG_BACKING_BIND_HOST:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./deploy/small/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - ubag-private
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  grafana:
    image: grafana/grafana-oss:12.0.2
    restart: unless-stopped
    profiles: ["observability"]
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in deploy/small/env.local}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${UBAG_BACKING_BIND_HOST:-127.0.0.1}:${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./deploy/small/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deploy/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - ubag-private

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    profiles: ["queue"]
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "${UBAG_BACKING_BIND_HOST:-127.0.0.1}:${NATS_CLIENT_PORT:-4222}:4222"
      - "${UBAG_BACKING_BIND_HOST:-127.0.0.1}:${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - nats_data:/data
    networks:
      - ubag-private
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8222/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── Profiling / error-agg / log-shipping (Task 2.7) ───────────────────────

  pyroscope:
    image: grafana/pyroscope:1.13.3
    restart: unless-stopped
    profiles: ["observability"]
    command: ["server"]
    ports:
      - "${UBAG_BACKING_BIND_HOST:-127.0.0.1}:${PYROSCOPE_PORT:-4040}:4040"
    volumes:
      - pyroscope_data:/data
    networks:
      - ubag-private

  glitchtip:
    image: glitchtip/glitchtip:v4.1.2
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      DATABASE_URL: ${GLITCHTIP_DATABASE_URL:-sqlite:////data/glitchtip.db}
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-changeme-in-production}
      PORT: "8000"
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8000}
    ports:
      - "${UBAG_BACKING_BIND_HOST:-127.0.0.1}:${GLITCHTIP_PORT:-8000}:8000"
    volumes:
      - glitchtip_data:/data
    networks:
      - ubag-private

  vector:
    image: timberio/vector:0.45.0-alpine
    restart: unless-stopped
    profiles: ["observability"]
    command: ["--config", "/etc/vector/vector.yaml"]
    volumes:
      - ./deploy/grafana/vector.yaml:/etc/vector/vector.yaml:ro
    networks:
      - ubag-private

  mock-worker-smoke:
    build:
      context: .
      dockerfile: deploy/small/mock-worker.Dockerfile
    image: ${UBAG_MOCK_WORKER_IMAGE:-ubag/mock-worker:small-local}
    profiles: ["smoke"]
    command: ["python", "apps/worker/run_mock_worker.py", "--input", "/fixtures/smoke-job.json"]
    volumes:
      - ./deploy/small/worker/smoke-job.json:/fixtures/smoke-job.json:ro
    networks:
      - ubag-private

  # ── WAL archiving + PITR (Task 3.4) — opt-in via COMPOSE_PROFILES=backup ───

  postgres-wal-archive:
    image: postgres:16-alpine
    profiles: [backup]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PGPASSWORD=${UBAG_POSTGRES_PASSWORD:-ubag}
      - MINIO_ENDPOINT=${UBAG_MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${UBAG_MINIO_ACCESS_KEY:-ubag-admin}
      - MINIO_SECRET_KEY=${UBAG_MINIO_SECRET_KEY:-ubag-secret-key}
      - MINIO_BUCKET=${UBAG_MINIO_BUCKET:-ubag-artifacts}
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${UBAG_POSTGRES_USER:-ubag}
      - POSTGRES_DB=${UBAG_POSTGRES_DB:-ubag}
    volumes:
      - ./deploy/small/backup/wal-archive.sh:/scripts/wal-archive.sh:ro
      - wal_archive_data:/var/lib/wal-archive
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "apk add --no-cache curl && while true; do /scripts/wal-archive.sh; sleep 300; done"
    networks:
      - ubag-private
    restart: unless-stopped

  backup-cron:
    image: postgres:16-alpine
    profiles: [backup]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PGPASSWORD=${UBAG_POSTGRES_PASSWORD:-ubag}
      - MINIO_ENDPOINT=${UBAG_MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${UBAG_MINIO_ACCESS_KEY:-ubag-admin}
      - MINIO_SECRET_KEY=${UBAG_MINIO_SECRET_KEY:-ubag-secret-key}
      - MINIO_BUCKET=${UBAG_MINIO_BUCKET:-ubag-artifacts}
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${UBAG_POSTGRES_USER:-ubag}
      - POSTGRES_DB=${UBAG_POSTGRES_DB:-ubag}
    volumes:
      - ./deploy/small/backup/backup-cron.sh:/scripts/backup-cron.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "apk add --no-cache curl && while true; do /scripts/backup-cron.sh; sleep 3600; done"
    networks:
      - ubag-private
    restart: unless-stopped

networks:
  ubag-public:
  ubag-private:
    internal: true

volumes:
  postgres_data:
  dragonfly_data:
  minio_data:
  prometheus_data:
  grafana_data:
  nats_data:
  executor_spool:
  browser_profiles:
  pyroscope_data:
  glitchtip_data:
  wal_archive_data: {}
